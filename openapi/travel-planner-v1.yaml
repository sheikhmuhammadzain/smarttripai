openapi: 3.1.0
info:
  title: Turkey AI Travel Planner API
  version: 1.0.0
  description: Versioned API for itinerary generation, saved trips, assistant chat, and realtime travel data.
servers:
  - url: http://localhost:3000/api/v1
    description: Local
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
  /itineraries/generate:
    post:
      summary: Generate itinerary draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItineraryRequest"
      responses:
        "200":
          description: Generated itinerary
  /itineraries:
    get:
      summary: List saved itineraries
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Itinerary page
    post:
      summary: Save generated itinerary
      responses:
        "201":
          description: Saved
  /itineraries/{id}:
    get:
      summary: Get itinerary by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Itinerary details
    patch:
      summary: Update itinerary notes/status
      responses:
        "200":
          description: Updated
    delete:
      summary: Delete itinerary
      responses:
        "204":
          description: Deleted
  /assistant/chat:
    post:
      summary: Chat with AI assistant
      responses:
        "200":
          description: Assistant response
  /attractions:
    get:
      summary: List curated attractions
      responses:
        "200":
          description: Attraction page
  /realtime/weather:
    get:
      summary: Get weather for city
      parameters:
        - in: query
          name: city
          required: true
          schema:
            type: string
        - in: query
          name: hours
          schema:
            type: integer
            minimum: 1
            maximum: 24
      responses:
        "200":
          description: Weather snapshot
  /realtime/currency:
    get:
      summary: Get currency conversion
      parameters:
        - in: query
          name: base
          schema:
            type: string
        - in: query
          name: target
          schema:
            type: string
      responses:
        "200":
          description: Currency rate
  /realtime/transport:
    get:
      summary: Get intercity transport guidance
      parameters:
        - in: query
          name: from
          required: true
          schema:
            type: string
        - in: query
          name: to
          required: true
          schema:
            type: string
        - in: query
          name: mode
          schema:
            type: string
            enum: [car, bus, flight]
        - in: query
          name: departureAt
          schema:
            type: string
            format: date-time
          description: Optional departure datetime used for transit schedule estimation.
      responses:
        "200":
          description: Transport estimate
  /users/me/preferences:
    get:
      summary: Get current user preference profile
      responses:
        "200":
          description: User preferences
    patch:
      summary: Update current user preference profile
      responses:
        "200":
          description: Updated user preferences
  /feedback:
    post:
      summary: Submit product feedback
      responses:
        "201":
          description: Feedback created
    get:
      summary: List feedback (admin)
      responses:
        "200":
          description: Feedback page
components:
  schemas:
    ItineraryRequest:
      type: object
      required:
        - destinations
        - startDate
        - endDate
        - budgetLevel
        - interests
        - travelers
        - pace
      properties:
        destinations:
          type: array
          items:
            type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        budgetLevel:
          type: string
          enum: [budget, standard, luxury]
        interests:
          type: array
          items:
            type: string
            enum: [culture, history, food, nature, adventure, relaxation]
        travelers:
          type: integer
          minimum: 1
        pace:
          type: string
          enum: [slow, balanced, fast]
